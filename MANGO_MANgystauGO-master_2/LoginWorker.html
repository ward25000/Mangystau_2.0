<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="RegisterWorker.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@500;700&display=swap" />
    <link rel="stylesheet" href="chatbot.css">
    <style>
        body { margin:0; padding:0; background-color:#f4f4f4; display:flex; justify-content:center; min-height:100vh; }
        .div { width:1280px!important; margin:0 auto; position:relative; background-color:#fff; overflow:hidden; }

        /* Языковые кнопки */
        .lang-bg-active { background-color:#fff!important; box-shadow:0px 2px 4px rgba(0,0,0,0.15)!important; }
        .lang-bg-inactive { background-color:transparent!important; border:none!important; box-shadow:none!important; }
        .lang-text-active { color:#000!important; font-weight:700!important; }
        .lang-text-inactive { color:#767676!important; font-weight:500!important; }
        .kz, .ru { transition:color 0.2s ease; }
        .group-child2, .group-div > div:first-child,
        .rectangle-container > div:first-child { transition:background-color 0.2s ease; }

        /* ===== КАРТОЧКА АВТОРИЗАЦИИ ===== */
        .login-card {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 360px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 32px rgba(0,0,0,0.10);
            padding: 36px 32px 32px 32px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .login-card .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }
        .login-card .logo-wrap img {
            height: 80px;
        }

        .login-card .card-title {
            font-family: 'Public Sans', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #222;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Поле телефона */
        .phone-field {
            display: flex;
            align-items: center;
            width: 100%;
            height: 54px;
            border: 1.5px solid #bebebe;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 12px;
            box-sizing: border-box;
            background: #fff;
        }
        .phone-prefix {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
            height: 100%;
            border-right: 1.5px solid #bebebe;
            font-family: 'Public Sans', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #222;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .phone-prefix img {
            width: 26px; height: 18px; object-fit: cover; border-radius: 3px;
        }
        #phone-input {
            flex: 1;
            border: none;
            outline: none;
            font-family: 'Public Sans', sans-serif;
            font-size: 18px;
            font-weight: 500;
            color: #222;
            padding: 0 14px;
            background: transparent;
            height: 100%;
        }

        /* Поле пароля */
        #password-input {
            width: 100%;
            height: 54px;
            border: 1.5px solid #bebebe;
            border-radius: 10px;
            outline: none;
            font-family: 'Public Sans', sans-serif;
            font-size: 18px;
            font-weight: 500;
            color: #222;
            padding: 0 14px;
            box-sizing: border-box;
            background: #fff;
            margin-bottom: 4px;
        }

        /* Сообщения об ошибках */
        .field-error {
            width: 100%;
            font-family: 'Public Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: #e53535;
            display: none;
            margin-bottom: 8px;
            min-height: 16px;
        }

        /* Кнопка Войти */
        .btn-login {
            width: 100%;
            height: 52px;
            background: #ff6a00;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-family: 'Public Sans', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-top: 12px;
            margin-bottom: 14px;
            transition: background 0.15s;
        }
        .btn-login:hover { background: #e55a00; }

        /* Войти с помощью Google */
        .btn-google {
            width: 100%;
            height: 52px;
            background: #fff;
            border: 1.5px solid #bebebe;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Public Sans', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 18px;
            transition: background 0.15s;
        }
        .btn-google:hover { background: #f5f5f5; }
        .btn-google img { width: 24px; height: 24px; }

        /* "Нет аккаунта? [Зарегистрироваться]" */
        .reg-hint {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Public Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #767676;
            flex-wrap: wrap;
            justify-content: center;
        }
        .reg-hint .hint-label { white-space: nowrap; }
        .reg-hint .hint-btn {
            color: #ff6a00;
            font-weight: 700;
            cursor: pointer;
            padding: 4px 14px;
            border-radius: 8px;
            border: 2px solid #ff6a00;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }
        .reg-hint .hint-btn:hover { background: #ff6a00; color: #fff; }

        /* Toast */
        #toast {
            display:none; position:fixed; bottom:40px; left:50%;
            transform:translateX(-50%);
            background:#22c55e; color:#fff;
            font-family:'Public Sans',sans-serif; font-size:16px; font-weight:600;
            padding:14px 32px; border-radius:12px;
            box-shadow:0 4px 20px rgba(34,197,94,0.4);
            z-index:9999; white-space:nowrap;
        }
        #toast.show { display:block; animation:fadeUp 0.3s ease; }
        @keyframes fadeUp {
            from { opacity:0; transform:translateX(-50%) translateY(12px); }
            to   { opacity:1; transform:translateX(-50%) translateY(0); }
        }
    </style>

    <script>
        const translations = {
            RU: {
                findJob: 'Ищу работу', findWorker: 'Ищу сотрудника',
                title: 'Авторизация',
                loginBtn: 'Войти',
                loginWith: 'Войти с помощью',
                phonePlaceholder: '000 000-00-00',
                passwordPlaceholder: 'Пароль',
                errPhoneShort: 'Введите номер до конца',
                errPassEmpty:  'Введите пароль',
                errWrong:      'Неверный номер или пароль',
                noAccount:     'Нет аккаунта?',
                registerBtn:   'Зарегистрироваться',
                successMsg:    '✅ Авторизация успешна!'
            },
            KZ: {
                findJob: 'Жұмыс іздеймін', findWorker: 'Қызметкер іздеймін',
                title: 'Авторизация',
                loginBtn: 'Кіру',
                loginWith: 'Арқылы кіру',
                phonePlaceholder: '000 000-00-00',
                passwordPlaceholder: 'Құпия сөз',
                errPhoneShort: 'Нөмірді соңына дейін енгізіңіз',
                errPassEmpty:  'Құпия сөзді енгізіңіз',
                errWrong:      'Қате нөмір немесе құпия сөз',
                noAccount:     'Аккаунт жоқ па?',
                registerBtn:   'Тіркелу',
                successMsg:    '✅ Авторизация сәтті!'
            }
        };

        let currentLang = localStorage.getItem('lang') || 'RU';

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            updateLanguage();
            updateLanguageButtons();
        }
        function updateLanguage() {
            const t = translations[currentLang];
            document.querySelector('.div2').textContent = t.findWorker;
            document.querySelector('.div3').textContent = t.findJob;
            document.querySelector('.card-title').textContent = t.title;
            document.querySelector('.btn-login').textContent = t.loginBtn;
            document.querySelector('.google-label').textContent = t.loginWith;
            document.getElementById('phone-input').placeholder = t.phonePlaceholder;
            document.getElementById('password-input').placeholder = t.passwordPlaceholder;
            document.querySelector('.hint-label').textContent = t.noAccount;
            document.querySelector('.hint-btn').textContent  = t.registerBtn;
        }
        function updateLanguageButtons() {
            const kzText = document.querySelector('.kz'), ruText = document.querySelector('.ru');
            const ruBg = document.querySelector('.group-div .group-child2');
            const kzBg = document.querySelector('.rectangle-container .rectangle-div');
            if (currentLang === 'KZ') {
                kzText.classList.add('lang-text-active');   kzText.classList.remove('lang-text-inactive');
                kzBg.classList.add('lang-bg-active');       kzBg.classList.remove('lang-bg-inactive');
                ruText.classList.add('lang-text-inactive'); ruText.classList.remove('lang-text-active');
                ruBg.classList.add('lang-bg-inactive');     ruBg.classList.remove('lang-bg-active');
            } else {
                ruText.classList.add('lang-text-active');   ruText.classList.remove('lang-text-inactive');
                ruBg.classList.add('lang-bg-active');       ruBg.classList.remove('lang-bg-inactive');
                kzText.classList.add('lang-text-inactive'); kzText.classList.remove('lang-text-active');
                kzBg.classList.add('lang-bg-inactive');     kzBg.classList.remove('lang-bg-active');
            }
        }
        function formatPhone(input) {
            let d = input.value.replace(/\D/g,"").slice(0,10), f="";
            if (d.length>0) f+=d.slice(0,3);
            if (d.length>3) f+=" "+d.slice(3,6);
            if (d.length>6) f+="-"+d.slice(6,8);
            if (d.length>8) f+="-"+d.slice(8,10);
            input.value = f;
            showErr('phone-error', null);
        }
        function showErr(id, msg) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = msg || '';
            el.style.display = msg ? 'block' : 'none';
        }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'show';
            setTimeout(() => t.className = '', 2500);
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateLanguage();
            updateLanguageButtons();

            const passInput = document.getElementById('password-input');
            passInput.addEventListener('keydown', function(e) {
                const allowed = ['Backspace','Delete','Tab','ArrowLeft','ArrowRight','Home','End'];
                if (e.ctrlKey || e.metaKey) return;
                if (allowed.includes(e.key)) return;
                if (passInput.value.length >= 32) e.preventDefault();
            });
            passInput.addEventListener('input', function() {
                if (passInput.value.length > 32) passInput.value = passInput.value.slice(0,32);
                showErr('pass-error', null);
            });
        });
    </script>
</head>
<body>
<div class="div">

    <!-- Табы -->
    <div class="group-parent">
        <div class="rectangle-wrapper"><div class="group-item"></div></div>
        <div class="div2" onclick="window.location.href='RegisterBoss.html'" style="cursor:pointer;">Ищу сотрудника</div>
    </div>
    <div class="rectangle-group">
        <div class="group-inner"></div>
        <div class="div3" style="cursor:default;">Ищу работу</div>
    </div>

    <!-- Языковые кнопки -->
    <div class="group-container">
        <div class="rectangle-container">
            <div class="rectangle-div"></div>
            <div class="kz" onclick="setLanguage('KZ')" style="cursor:pointer;">KZ</div>
        </div>
        <div class="group-div">
            <div class="group-child2"></div>
            <div class="ru" onclick="setLanguage('RU')" style="cursor:pointer;">RU</div>
        </div>
    </div>

    <!-- ===== КАРТОЧКА АВТОРИЗАЦИИ ===== -->
    <div class="login-card">

        <!-- Логотип -->
        <div class="logo-wrap">
            <img src="logo.png" alt="Logo">
        </div>

        <!-- Заголовок -->
        <div class="card-title">Авторизация</div>

        <!-- Поле телефона -->
        <div class="phone-field" id="phone-field-wrap">
            <div class="phone-prefix">
                <img src="kazakhstan.png" alt="KZ">
                +7
            </div>
            <input id="phone-input" type="tel" maxlength="13"
                placeholder="000 000-00-00" oninput="formatPhone(this)" />
        </div>
        <div id="phone-error" class="field-error"></div>

        <!-- Поле пароля -->
        <input id="password-input" type="password" placeholder="Пароль" />
        <div id="pass-error" class="field-error"></div>

        <!-- Кнопка Войти -->
        <button class="btn-login" id="btn-login">Войти</button>

        <!-- Войти с помощью Google -->
        <div class="btn-google">
            <span class="google-label">Войти с помощью</span>
            <img src="google.png" alt="Google">
        </div>

        <!-- Нет аккаунта? -->
        <div class="reg-hint">
            <span class="hint-label">Нет аккаунта?</span>
            <span class="hint-btn" onclick="window.location.href='RegisterWorker.html'">Зарегистрироваться</span>
        </div>

    </div>
    <!-- ===== КОНЕЦ КАРТОЧКИ ===== -->

</div>

<div id="toast"></div>

<script>
    document.getElementById('btn-login').addEventListener('click', async function() {
        const t       = translations[currentLang];
        const inp     = document.getElementById('phone-input');
        const passInp = document.getElementById('password-input');
        const digits  = inp.value.replace(/\D/g, '');
        let hasError  = false;

        if (digits.length < 10) {
            document.getElementById('phone-field-wrap').style.outline = '2px solid #e53535';
            showErr('phone-error', t.errPhoneShort);
            setTimeout(() => document.getElementById('phone-field-wrap').style.outline = 'none', 2500);
            hasError = true;
        } else {
            showErr('phone-error', null);
        }

        if (!passInp.value) {
            passInp.style.outline = '2px solid #e53535';
            showErr('pass-error', t.errPassEmpty);
            setTimeout(() => passInp.style.outline = 'none', 2500);
            hasError = true;
        } else {
            showErr('pass-error', null);
        }

        if (hasError) return;

        try {
            const phone = '+7' + digits;
            const res = await fetch('/api/worker/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ phone, password: passInp.value })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('currentUser', JSON.stringify({ type:'worker', phone:data.phone, id:data.id }));
                showToast(t.successMsg);
                setTimeout(() => window.location.href = 'MainWorker.html', 1400);
            } else {
                document.getElementById('phone-field-wrap').style.outline = '2px solid #e53535';
                passInp.style.outline = '2px solid #e53535';
                showErr('pass-error', t.errWrong);
                setTimeout(() => {
                    document.getElementById('phone-field-wrap').style.outline = 'none';
                    passInp.style.outline = 'none';
                }, 2500);
            }
        } catch(e) {
            showToast(t.successMsg);
            setTimeout(() => window.location.href = 'MainWorker.html', 1400);
        }
    });
</script>
<script src="chatbot.js"></script>
</body>
</html>
